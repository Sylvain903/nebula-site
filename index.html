<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NÉBULA CRÉATION | Expertise Hardware</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #050510; 
            color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* FOND NÉBULA IMMERSIF */
        .main-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://nebulacreation.fr/bg.png') no-repeat center center;
            background-size: cover;
            z-index: 0; 
            animation: fadeIn 3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* COUCHE D'INTERACTION */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 20px; /* Moins de padding pour que ça soit plus bas */
            z-index: 1; 
        }

        /* DASHBOARD TACTIQUE (FLEXBOX) */
        .action-zone {
            display: flex; gap: 40px; flex-wrap: wrap; justify-content: center;
            padding: 20px;
            z-index: 2; 
        }

        /* STYLE DES ITEMS (SANS RECTANGLE) */
        .card {
            background: none; /* PLUS DE FOND SOMBRE */
            border: none; /* PLUS DE BORDURE */
            padding: 0; /* PLUS DE PADDING AUTOUR */
            width: auto; /* Largeur automatique selon l'image */
            cursor: pointer;
            transition: all 0.4s ease;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            /* Légère transparence par défaut pour le look */
            opacity: 0.8; 
        }

        /* L'IMAGE OVALE - ON LA BOOST GRAVE */
        .card img {
            width: 180px; /* Taille massive sur PC, ajuste au besoin */
            height: auto;
            margin-bottom: 15px;
            /* Ombre portée pour détacher du fond (style Nébula) */
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
            transition: transform 0.4s ease;
        }

        /* TEXTES */
/* TEXTES - BOOST DE LISIBILITÉ */
        .card h3 { 
            margin: 10px 0 5px 0; 
            font-size: 16px; 
            color: #00d2ff; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.8);
        }
        
        .card p { 
            font-size: 12px; 
            color: #ffffff; 
            margin: 0; 
            line-height: 1.4;
            padding: 5px 10px;
            /* Le secret est là : un léger voile pour lire sans effort */
            background: rgba(0, 0, 0, 0.4); 
            border-radius: 5px;
        }

        /* EFFET HOVER (SURVOL SOURIS) */
        .card:hover {
            transform: translateY(-15px);
            opacity: 1;
        }

        .card:hover img {
            transform: scale(1.05);
        }

        /* STYLE SPÉCIFIQUE LUCIFERIUM (ROUGE) */
        .card.lucifer h3 { 
            color: #ff4500; 
            text-shadow: 0 0 10px rgba(255, 69, 0, 0.8); 
        }

        .card.lucifer:hover h3 {
            color: #ffffff;
            text-shadow: 0 0 15px #ff4500, 0 0 25px #ff4500;
        }
        /* Au survol de Lucifer, le texte change aussi de couleur */
        .card.lucifer:hover p {
            color: rgba(255, 100, 100, 1);
        }    
        /* 📱 OPTIMISATION POUR MOBILE (S24 ULTRA & CO) */
        @media screen and (max-width: 768px) {
            
            /* 1. ON APPELLE LA NOUVELLE IMAGE PORTRAIT */
            .main-bg {
                background-image: url('bg-mobile.png'); 
                background-size: cover; 
                background-position: center top; 
                background-attachment: scroll;
            }

            /* 2. ON POUSSE LES ICÔNES VERS LE BAS (DANS LA ZONE SOMBRE) */
            .overlay {
                justify-content: flex-start; 
                padding-top: 280px; /* On laisse de la place pour ton beau logo en haut */
                height: 100vh;
                overflow-y: auto; 
            }

            /* 3. ON RANGE LES ICÔNES EN GRILLE 2x2 */
            .action-zone {
                gap: 25px 20px; 
                padding: 10px;
                display: grid; 
                grid-template-columns: repeat(2, 1fr); 
                width: 95%; 
            }

            .card {
                width: 100%; 
                opacity: 1; 
            }

            .card img {
                width: 120px; 
                margin-bottom: 10px;
            }

            .card h3 {
                font-size: 14px; 
            }

            .card p {
                display: none; /* On cache le petit texte sur mobile pour garder ça épuré */
            }
        }

    </style>
</head>
<body>

    <div class="main-bg"></div>

    <div class="overlay">
        <div class="action-zone">
            
            <a href="#forge" class="card">
                <img src="Iforge.png" alt="Forge Hardware">
                <h3>FORGE HARDWARE</h3>
                <p>Montage Tours & Optimisation Custom</p>
            </a>

            <a href="#clinique" class="card">
                <img src="iclinique.png" alt="Clinique OS">
                <h3>CLINIQUE OS</h3>
                <p>Dépannage & Tuning Windows 10/11</p>
            </a>

            <a href="#multimedia" class="card">
                <img src="imultimedia.png" alt="Multimédia">
                <h3>MULTIMÉDIA</h3>
                <p>Hi-Fi, Box & Domotique Pro</p>
            </a>

            <a href="https://luciferium-site.vercel.app/" class="card lucifer">
                <img src="iluciferium.png" alt="Luciferium">
                <h3>LUCIFERIUM</h3>
                <p>Accès Projet & Communauté</p>
            </a>

        </div>
    </div>

</body>
</html>
