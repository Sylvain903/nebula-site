<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NÉBULA CRÉATION | Expertise Hardware</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #050510; 
            color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* FOND NÉBULA IMMERSIF */
        .main-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://nebulacreation.fr/bg.png') no-repeat center center;
            background-size: cover;
            z-index: 0; 
            animation: fadeIn 3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* COUCHE D'INTERACTION */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 20px;
            z-index: 1; 
        }

        /* DASHBOARD TACTIQUE (FLEXBOX) */
        .action-zone {
            display: flex; gap: 40px; flex-wrap: wrap; justify-content: center;
            padding: 20px;
            z-index: 2; 
        }

        /* STYLE DES ITEMS */
        .card {
            background: none;
            border: none;
            padding: 0;
            width: auto;
            cursor: pointer;
            transition: all 0.4s ease;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            opacity: 0.8; 
        }

        .card img {
            width: 180px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
            transition: transform 0.4s ease;
        }

        .card h3 { 
            margin: 10px 0 5px 0; 
            font-size: 16px; 
            color: #00d2ff; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.8);
        }
        
        .card p { 
            font-size: 12px; 
            color: #ffffff; 
            margin: 0; 
            line-height: 1.4;
            padding: 5px 10px;
            background: rgba(0, 0, 0, 0.4); 
            border-radius: 5px;
        }

        .card:hover {
            transform: translateY(-15px);
            opacity: 1;
        }

        .card:hover img {
            transform: scale(1.05);
        }

        .card.lucifer h3 { 
            color: #ff4500; 
            text-shadow: 0 0 10px rgba(255, 69, 0, 0.8); 
        }

        .card.lucifer:hover h3 {
            color: #ffffff;
            text-shadow: 0 0 15px #ff4500, 0 0 25px #ff4500;
        }

        /* 📱 OPTIMISATION POUR MOBILE PORTRAIT */
        @media screen and (max-width: 768px) {
            .main-bg {
                background-image: url('bg-mobile.png'); 
                background-size: cover; 
                background-position: center top; 
            }
            .overlay {
                justify-content: flex-start; 
                padding-top: 280px;
                height: 100vh;
                overflow-y: auto; 
            }
            .action-zone {
                gap: 25px 20px; 
                display: grid; 
                grid-template-columns: repeat(2, 1fr); 
            }
            .card img { width: 120px; }
            .card p { display: none; }
        }

        /* 🔄 AJUSTEMENT PAYSAGE MOBILE (LANDSCAPE) */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            body, html { overflow-y: auto !important; }
            .main-bg { background-size: 250%; background-position: bottom right; filter: brightness(0.3) blur(2px); }
            .overlay { position: relative; height: auto; padding-top: 20px; }
            .overlay::before {
                content: "NÉBULA CRÉATION";
                display: block; font-size: 18px; letter-spacing: 5px; color: #00d2ff;
                text-shadow: 0 0 10px rgba(0, 210, 255, 0.8); margin-bottom: 20px;
            }
            .action-zone { grid-template-columns: repeat(4, 1fr); }
            .card img { width: 80px; }
        }
    </style>
</head>
<body>

    <div class="main-bg"></div>

    <div class="overlay">
        <div class="action-zone">
            
            <a href="forge.html" class="card">
                <img src="Iforge.png" alt="Forge Hardware">
                <h3>FORGE HARDWARE</h3>
                <p>Montage Tours & Optimisation Custom</p>
            </a>

            <a href="clinique.html" class="card">
                <img src="iclinique.png" alt="Clinique OS">
                <h3>CLINIQUE OS</h3>
                <p>Dépannage & Tuning Windows 10/11</p>
            </a>

            <a href="multimedia.html" class="card">
                <img src="imultimedia.png" alt="Multimédia">
                <h3>MULTIMÉDIA</h3>
                <p>Hi-Fi, Box & Domotique Pro</p>
            </a>

            <a href="https://luciferium-site.vercel.app/" class="card lucifer" target="_blank">
                <img src="iluciferium.png" alt="Luciferium">
                <h3>LUCIFERIUM</h3>
                <p>Accès Projet & Communauté</p>
            </a>

        </div>
    </div>

</body>
</html>
