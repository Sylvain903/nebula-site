<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NÉBULA CRÉATION | Expertise Hardware</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            /* On enlève le fond noir absolu du body pour laisser voir l'image */
            background-color: #111; 
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .main-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Lien direct vers ton image */
            background: url('https://nebulacreation.fr/bg.png') no-repeat center center;
            background-color: #000;
           background-size: contain;
            /* CORRECTION : L'image est au niveau 0 (la base) */
            z-index: 0; 
            animation: fadeIn 3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 60px;
            /* CORRECTION : L'overlay est au-dessus de l'image (niveau 1) */
            z-index: 1; 
        }

        .action-zone {
            display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
            padding: 20px;
            /* CORRECTION : Les boutons sont tout au-dessus (niveau 2) */
            z-index: 2; 
        }

        .card {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 150, 255, 0.5);
            padding: 15px; width: 200px;
            backdrop-filter: blur(10px);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .card:hover {
            border-color: #0096ff;
            transform: translateY(-10px);
            box-shadow: 0 0 25px rgba(0, 150, 255, 0.5);
            background: rgba(0, 50, 100, 0.3);
        }

        .card h3 { margin: 0 0 8px 0; font-size: 16px; color: #0096ff; text-transform: uppercase; }
        .card p { font-size: 12px; color: #fff; margin: 0; line-height: 1.3; }

        .card.lucifer { border-color: #ff4500; }
        .card.lucifer h3 { color: #ff4500; }
        .card.lucifer:hover { 
            border-color: #ff4500; 
            box-shadow: 0 0 25px rgba(255, 69, 0, 0.5);
            background: rgba(100, 30, 0, 0.3);
        }
    </style>
</head>
<body>

    <div class="main-bg"></div>

    <div class="overlay">
        <div class="action-zone">
            <div class="card">
                <h3>FORGE HARDWARE</h3>
                <p>Montage Tours & Optimisation Custom</p>
            </div>
            <div class="card">
                <h3>CLINIQUE OS</h3>
                <p>Dépannage & Tuning Windows 10/11</p>
            </div>
            <div class="card">
                <h3>MULTIMÉDIA</h3>
                <p>Hi-Fi, Box & Domotique Pro</p>
            </div>
            <div class="card lucifer" onclick="window.location.href='https://luciferium-site.vercel.app/'">
                <h3>LUCIFERIUM</h3>
                <p>Accès Projet & Communauté</p>
            </div>
        </div>
    </div>

</body>
</html>
