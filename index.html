<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NÉBULA CRÉATION | Expertise Hardware</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* CORRECTION : On pointe bien vers le .png maintenant */
        .main-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('accueilnebula.png') no-repeat center center;
            background-size: cover;
            z-index: -1;
            animation: fadeIn 3s ease-in; /* Apparition en douceur */
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2); /* Un voile léger pour la lisibilité */
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 80px; /* On pose les boutons sur le reflet du bas */
        }

        .action-zone {
            display: flex; gap: 25px; flex-wrap: wrap; justify-content: center;
        }

        .card {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 150, 255, 0.3);
            padding: 20px; width: 220px;
            backdrop-filter: blur(8px);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        /* Effet "Bleu Électrique" au survol */
        .card:hover {
            border-color: #0096ff;
            transform: translateY(-15px);
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.6);
            background: rgba(0, 150, 255, 0.1);
        }

        .card h3 { margin: 0 0 10px 0; font-size: 18px; letter-spacing: 1px; color: #0096ff; }
        .card p { font-size: 13px; color: #eee; margin: 0; line-height: 1.4; }

        /* Style spécial pour le bouton Luciferium (Orange/Feu) */
        .card.lucifer { border-color: rgba(255, 69, 0, 0.4); }
        .card.lucifer h3 { color: #ff4500; }
        .card.lucifer:hover { 
            border-color: #ff4500; 
            box-shadow: 0 0 30px rgba(255, 69, 0, 0.6);
            background: rgba(255, 69, 0, 0.1);
        }

    </style>
</head>
<body>

    <div class="main-bg"></div>

    <div class="overlay">
        <div class="action-zone">
            <div class="card">
                <h3>FORGE HARDWARE</h3>
                <p>Montage Tours Fixes & Optimisation Custom</p>
            </div>
            <div class="card">
                <h3>CLINIQUE OS</h3>
                <p>Dépannage & Tuning Windows 10/11</p>
            </div>
            <div class="card">
                <h3>MULTIMÉDIA</h3>
                <p>Installation Hi-Fi, Box & Domotique</p>
            </div>
            <div class="card lucifer" onclick="window.location.href='https://luciferium-site.vercel.app/'">
                <h3>LUCIFERIUM</h3>
                <p>Accès Projet & Communauté</p>
            </div>
        </div>
    </div>

</body>
</html>
